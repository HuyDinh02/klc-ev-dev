appId: vn.klc.driver
name: Favorites & History Flow
---
# Verifies favorites and history screens
- launchApp:
    appId: vn.klc.driver
    clearState: true

# Login first
- assertVisible:
    text: "Đăng nhập"
    timeout: 10000
- tapOn:
    id: "login-phone-input"
- inputText: "0901234001"
- tapOn:
    id: "login-password-input"
- inputText: "Admin@123"
- tapOn:
    id: "login-submit-button"

# Wait for home
- assertVisible:
    text: "Trạm sạc"
    timeout: 15000

# Navigate to Favorites
- tapOn: "Yêu thích"
- assertVisible:
    text: "Yêu thích"
    timeout: 5000

# Navigate to History
- tapOn: "Lịch sử"
- assertVisible:
    text: "Lịch sử sạc"
    timeout: 5000

# Navigate back to home
- tapOn: "Trạm sạc"
