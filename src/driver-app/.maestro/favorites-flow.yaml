appId: vn.klc.driver
name: Favorites Flow
---
# Verifies favorites screen and empty state
# Prerequisite: User must be logged in
- launchApp:
    appId: vn.klc.driver

# Wait for app to load
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000

# Navigate to Favorites tab
- tapOn:
    id: "tab-favorites"
    optional: true
- tapOn:
    text: "Favorites"
    optional: true

# Verify favorites screen
- assertVisible:
    text: "Favorites"
    timeout: 5000

# Check for stations or empty state
- assertVisible:
    text: ".*"
    timeout: 3000

# Navigate to History tab
- tapOn:
    id: "tab-history"
    optional: true
- tapOn:
    text: "History"
    optional: true

# Verify history screen
- assertVisible:
    text: "Charging History"
    timeout: 5000

# Navigate back to home
- tapOn:
    id: "tab-home"
    optional: true
