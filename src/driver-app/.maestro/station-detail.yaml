appId: vn.klc.driver
name: Station Detail Flow
---
# Verifies station detail screen from home station list
- launchApp:
    appId: vn.klc.driver
    clearState: true

# Login first
- assertVisible:
    text: "Đăng nhập"
    timeout: 10000
- tapOn:
    id: "login-phone-input"
- inputText: "0901234001"
- tapOn:
    id: "login-password-input"
- inputText: "Admin@123"
- tapOn:
    id: "login-submit-button"

# Wait for home screen with stations
- assertVisible:
    text: "Trạm sạc gần đây"
    timeout: 15000

# Switch to list view if needed
- tapOn:
    text: "Danh sách"
    optional: true

# Wait for station list to load
- extendedWaitUntil:
    visible: ".*km"
    timeout: 10000

# Tap on first station
- tapOn:
    text: ".*km"
    index: 0
    optional: true

# Verify station detail screen
- assertVisible:
    text: "Đầu sạc"
    timeout: 5000
    optional: true

# Go back
- back
