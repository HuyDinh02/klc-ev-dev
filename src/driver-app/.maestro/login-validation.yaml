appId: vn.klc.driver
name: Login Validation
---
# Verifies login form validation (empty fields, wrong credentials)
- launchApp:
    appId: vn.klc.driver
    clearState: true

# Wait for login screen
- extendedWaitUntil:
    visible: "Đăng nhập"
    timeout: 10000

# Try login with empty fields — should show alert
- tapOn:
    id: "login-submit-button"

# Dismiss error alert
- extendedWaitUntil:
    visible: "Lỗi"
    timeout: 3000
- tapOn: "OK"

# Enter only phone, no password — should still fail
- tapOn:
    id: "login-phone-input"
- inputText: "0901234001"
- tapOn:
    id: "login-submit-button"

# Dismiss error alert
- extendedWaitUntil:
    visible: "Lỗi"
    timeout: 3000
- tapOn: "OK"

# Enter wrong password
- tapOn:
    id: "login-password-input"
- inputText: "WrongPassword"
- tapOn:
    id: "login-submit-button"

# Should show invalid credentials error
- extendedWaitUntil:
    visible: "Lỗi"
    timeout: 10000
- tapOn: "OK"
