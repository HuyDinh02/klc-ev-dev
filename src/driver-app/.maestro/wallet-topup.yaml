appId: vn.klc.driver
name: Wallet Top-Up Flow
---
# Verifies wallet screen, balance display, and top-up options
- launchApp:
    appId: vn.klc.driver
    clearState: true

# Login first
- assertVisible:
    text: "Đăng nhập"
    timeout: 10000
- tapOn:
    id: "login-phone-input"
- inputText: "0901234001"
- tapOn:
    id: "login-password-input"
- inputText: "Admin@123"
- tapOn:
    id: "login-submit-button"

# Wait for home, navigate to wallet
- assertVisible:
    text: "Trạm sạc"
    timeout: 15000
- tapOn: "Ví"

# Verify wallet screen elements
- assertVisible:
    text: "Số dư ví"
    timeout: 5000

# Verify balance is shown (should have some amount for test account)
- assertVisible:
    text: ".*đ"
    timeout: 5000

# Verify top-up button
- assertVisible: "Nạp tiền"

# Verify quick top-up section
- assertVisible:
    text: "Nạp nhanh"
    optional: true

# Verify transaction history section
- assertVisible:
    text: "Lịch sử giao dịch"
    optional: true
