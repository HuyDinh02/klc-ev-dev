appId: vn.klc.driver
name: Profile & Account Flow
---
# Verifies profile screen, menu items, and sub-screens
- launchApp:
    appId: vn.klc.driver
    clearState: true

# Login first
- assertVisible:
    text: "Đăng nhập"
    timeout: 10000
- tapOn:
    id: "login-phone-input"
- inputText: "0901234001"
- tapOn:
    id: "login-password-input"
- inputText: "Admin@123"
- tapOn:
    id: "login-submit-button"

# Wait for home, navigate to profile
- assertVisible:
    text: "Trạm sạc"
    timeout: 15000
- tapOn: "Tài khoản"

# Verify profile screen
- assertVisible:
    text: "Tài khoản"
    timeout: 5000

# Verify user name is displayed
- assertVisible:
    text: "Nguyễn Văn An"
    timeout: 5000

# Verify menu items
- assertVisible: "Phương thức thanh toán"
- assertVisible: "Thông báo"
- assertVisible: "Cài đặt"
- assertVisible: "Trợ giúp & Hỗ trợ"

# Navigate to Settings
- tapOn: "Cài đặt"
- assertVisible:
    text: "Cài đặt"
    timeout: 5000
- back

# Navigate to Help & Support
- tapOn: "Trợ giúp & Hỗ trợ"
- assertVisible:
    text: "Trợ giúp & Hỗ trợ"
    timeout: 5000
- back

# Verify logout button exists (scroll down if needed)
- scrollUntilVisible:
    element:
      text: "Đăng xuất"
    direction: DOWN
    timeout: 5000

# Tap logout but cancel
- tapOn: "Đăng xuất"
- assertVisible:
    text: "Đăng xuất"
    timeout: 3000
- tapOn: "Hủy"
