appId: vn.klc.driver
name: Tab Navigation
---
# Verifies all bottom tab navigation works after login
- launchApp:
    appId: vn.klc.driver
    clearState: true

# Login first
- assertVisible:
    text: "Đăng nhập"
    timeout: 10000
- tapOn:
    id: "login-phone-input"
- inputText: "0901234001"
- tapOn:
    id: "login-password-input"
- inputText: "Admin@123"
- tapOn:
    id: "login-submit-button"

# Wait for home screen
- assertVisible:
    text: "Trạm sạc"
    timeout: 15000

# Navigate to Favorites tab
- tapOn: "Yêu thích"
- assertVisible:
    text: "Yêu thích"
    timeout: 5000

# Navigate to History tab
- tapOn: "Lịch sử"
- assertVisible:
    text: "Lịch sử sạc"
    timeout: 5000

# Navigate to Wallet tab
- tapOn: "Ví"
- assertVisible:
    text: "Số dư ví"
    timeout: 5000

# Navigate to Profile tab
- tapOn: "Tài khoản"
- assertVisible:
    text: "Tài khoản"
    timeout: 5000

# Navigate back to Home tab
- tapOn: "Trạm sạc"
- assertVisible:
    text: "Trạm sạc gần đây"
    timeout: 5000
