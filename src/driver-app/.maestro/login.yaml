appId: vn.klc.driver
name: Login Flow
---
# Login flow — verifies user can log in with valid credentials
- launchApp:
    appId: vn.klc.driver
    clearState: true

# Wait for login screen
- extendedWaitUntil:
    visible: "K-Charge"
    timeout: 10000

- assertVisible: "Đăng nhập"

# Enter phone number
- tapOn:
    id: "login-phone-input"
- inputText: "0901234001"

# Enter password
- tapOn:
    id: "login-password-input"
- inputText: "Admin@123"

# Submit login
- tapOn:
    id: "login-submit-button"

# Wait for home screen — tabs should appear
- extendedWaitUntil:
    visible: "Trạm sạc"
    timeout: 15000

# Verify bottom tabs are visible (home loaded successfully)
- assertVisible: "Yêu thích"
- assertVisible: "Ví"
- assertVisible: "Tài khoản"
