# SonarQube / SonarCloud Configuration
# Docs: https://docs.sonarsource.com/sonarqube/latest/analyzing-source-code/scanners/sonarscanner/

sonar.projectKey=klc-ev-charging
sonar.organization=howard-tech
sonar.projectName=KLC EV Charging

# Source paths
sonar.sources=src/backend/src,src/admin-portal/src,src/driver-app/src
sonar.tests=src/backend/test,src/admin-portal/src/**/__tests__

# Exclusions (generated/third-party code)
sonar.exclusions=\
  **/node_modules/**,\
  **/bin/**,\
  **/obj/**,\
  **/Migrations/**,\
  **/wwwroot/**,\
  **/*.Designer.cs,\
  **/dist/**,\
  **/.next/**,\
  **/coverage/**

# .NET backend
sonar.cs.opencover.reportsPaths=src/backend/test/**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=test-results/**/*.trx

# TypeScript/JavaScript (admin portal + driver app)
sonar.typescript.lcov.reportPaths=\
  src/admin-portal/coverage/lcov.info,\
  src/driver-app/coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate
# Uses default "Sonar way" quality gate:
# - No new bugs
# - No new vulnerabilities
# - No new security hotspots
# - Code coverage on new code >= 80%
# - Duplicated lines on new code <= 3%
