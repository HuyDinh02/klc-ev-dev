name: Deploy Staging

on:
  push:
    branches: [develop]
    paths:
      - "src/backend/**"
      - "src/admin-portal/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run EF Core database migrations"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  AR_REPO: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/klc-backend

permissions:
  contents: read
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Detect which paths changed
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: [self-hosted, linux, x64, gce]
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin-portal: ${{ steps.filter.outputs.admin-portal }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/backend/**'
            admin-portal:
              - 'src/admin-portal/**'

  # ---------------------------------------------------------------------------
  # Build, push & deploy in a single job
  # (eliminates repeated GCP auth and runner queue waits between jobs)
  # ---------------------------------------------------------------------------
  build-and-deploy:
    name: Build & Deploy
    runs-on: [self-hosted, linux, x64, gce]
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.admin-portal == 'true'
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # -----------------------------------------------------------------------
      # Build Docker images (only changed components)
      # -----------------------------------------------------------------------

      # Admin API (also used for OCPP Gateway — same image)
      - name: Build Backend API image
        if: needs.changes.outputs.backend == 'true'
        run: |
          IMAGE="${{ env.AR_REPO }}/backend-api:${{ github.sha }}"
          docker build -t "${IMAGE}" -f src/backend/src/KLC.HttpApi.Host/Dockerfile src/backend
          docker tag "${IMAGE}" "${{ env.AR_REPO }}/backend-api:latest"
          docker push "${IMAGE}"
          docker push "${{ env.AR_REPO }}/backend-api:latest"

      # Driver BFF
      - name: Build BFF Socket image
        if: needs.changes.outputs.backend == 'true'
        run: |
          IMAGE="${{ env.AR_REPO }}/bff-socket:${{ github.sha }}"
          docker build -t "${IMAGE}" -f src/backend/src/KLC.Driver.BFF/Dockerfile src/backend
          docker tag "${IMAGE}" "${{ env.AR_REPO }}/bff-socket:latest"
          docker push "${IMAGE}"
          docker push "${{ env.AR_REPO }}/bff-socket:latest"

      # Admin Portal
      - name: Build Admin Portal image
        if: needs.changes.outputs.admin-portal == 'true'
        run: |
          IMAGE="${{ env.AR_REPO }}/admin-portal:${{ github.sha }}"
          docker build -t "${IMAGE}" \
            --build-arg NEXT_PUBLIC_API_URL=https://api.ev.odcall.com \
            --build-arg NEXT_PUBLIC_OCPP_URL=https://ocpp.ev.odcall.com \
            -f src/admin-portal/Dockerfile src/admin-portal
          docker tag "${IMAGE}" "${{ env.AR_REPO }}/admin-portal:latest"
          docker push "${IMAGE}"
          docker push "${{ env.AR_REPO }}/admin-portal:latest"

      # -----------------------------------------------------------------------
      # Deploy to Cloud Run (sequential in same job — no runner queue waits)
      # -----------------------------------------------------------------------

      - name: Deploy Admin API
        if: needs.changes.outputs.backend == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        id: deploy-api
        with:
          service: klc-admin-api
          region: ${{ env.GCP_REGION }}
          image: ${{ env.AR_REPO }}/backend-api:${{ github.sha }}
          flags: >-
            --port=8080
            --memory=1Gi
            --cpu=1
            --min-instances=1
            --max-instances=5
            --concurrency=200
            --timeout=300
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:klc-postgres
            --vpc-connector=klc-connector
            --vpc-egress=private-ranges-only
            --cpu-boost
            --set-env-vars=^||^ASPNETCORE_ENVIRONMENT=Production||App__CorsOrigins=https://ev.odcall.com,https://api.ev.odcall.com,http://localhost:3001||Ocpp__GatewayUrl=https://ocpp.ev.odcall.com||Firebase__CredentialPath=/secrets/firebase/service-account.json
            --set-secrets=ConnectionStrings__Default=db-connection-string:latest,ConnectionStrings__Redis=redis-connection-string:latest,Jwt__SecretKey=jwt-secret-key:latest,Internal__ApiKey=internal-api-key:latest,StringEncryption__DefaultPassPhrase=string-encryption-passphrase:latest,Payment__MoMo__PartnerCode=momo-partner-code:latest,Payment__MoMo__AccessKey=momo-access-key:latest,Payment__MoMo__SecretKey=momo-secret-key:latest,Payment__VnPay__TmnCode=vnpay-tmn-code:latest,Payment__VnPay__HashSecret=vnpay-hash-secret:latest,Payment__VnPay__BaseUrl=vnpay-base-url:latest,Payment__VnPay__QueryApiUrl=vnpay-query-api-url:latest,OPENIDDICT_SIGNING_CERT=openiddict-signing-cert:latest,OPENIDDICT_SIGNING_PASSWORD=openiddict-signing-password:latest,OPENIDDICT_ENCRYPTION_CERT=openiddict-encryption-cert:latest,OPENIDDICT_ENCRYPTION_PASSWORD=openiddict-encryption-password:latest,/secrets/firebase/service-account.json=firebase-service-account:latest

      - name: Deploy OCPP Gateway
        if: needs.changes.outputs.backend == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        id: deploy-gateway
        with:
          service: klc-ocpp-gateway
          region: ${{ env.GCP_REGION }}
          image: ${{ env.AR_REPO }}/backend-api:${{ github.sha }}
          flags: >-
            --port=8080
            --memory=1Gi
            --cpu=1
            --min-instances=1
            --max-instances=1
            --timeout=3600
            --session-affinity
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:klc-postgres
            --vpc-connector=klc-connector
            --vpc-egress=private-ranges-only
            --cpu-boost
            --set-env-vars=^||^ASPNETCORE_ENVIRONMENT=Production||App__CorsOrigins=https://ev.odcall.com,https://api.ev.odcall.com,http://localhost:3001||Firebase__CredentialPath=/secrets/firebase/service-account.json
            --set-secrets=ConnectionStrings__Default=db-connection-string:latest,ConnectionStrings__Redis=redis-connection-string:latest,Jwt__SecretKey=jwt-secret-key:latest,Internal__ApiKey=internal-api-key:latest,StringEncryption__DefaultPassPhrase=string-encryption-passphrase:latest,OPENIDDICT_SIGNING_CERT=openiddict-signing-cert:latest,OPENIDDICT_SIGNING_PASSWORD=openiddict-signing-password:latest,OPENIDDICT_ENCRYPTION_CERT=openiddict-encryption-cert:latest,OPENIDDICT_ENCRYPTION_PASSWORD=openiddict-encryption-password:latest,/secrets/firebase/service-account.json=firebase-service-account:latest

      # Force charger reconnection: delete old OCPP Gateway revisions so the
      # old instance shuts down → OnApplicationShutdown closes WebSockets →
      # chargers reconnect to the new revision within seconds.
      - name: Force OCPP Gateway charger reconnection
        if: needs.changes.outputs.backend == 'true'
        run: |
          echo "Waiting 10s for new OCPP Gateway revision to stabilize..."
          sleep 10
          LATEST=$(gcloud run revisions list \
            --service=klc-ocpp-gateway \
            --region=${{ env.GCP_REGION }} \
            --format='value(REVISION)' \
            --sort-by=~creationTimestamp \
            --limit=1)
          echo "Latest revision: $LATEST"
          OLD_REVISIONS=$(gcloud run revisions list \
            --service=klc-ocpp-gateway \
            --region=${{ env.GCP_REGION }} \
            --format='value(REVISION)' \
            --sort-by=~creationTimestamp | tail -n +2)
          if [ -n "$OLD_REVISIONS" ]; then
            echo "Deleting old revisions to force charger reconnection..."
            for rev in $OLD_REVISIONS; do
              echo "  Deleting $rev"
              gcloud run revisions delete "$rev" \
                --region=${{ env.GCP_REGION }} --quiet || true
            done
            echo "Old revisions deleted. Chargers will reconnect to $LATEST."
          else
            echo "No old revisions to clean up."
          fi

      - name: Deploy Driver BFF
        if: needs.changes.outputs.backend == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        id: deploy-bff
        with:
          service: klc-driver-bff
          region: ${{ env.GCP_REGION }}
          image: ${{ env.AR_REPO }}/bff-socket:${{ github.sha }}
          flags: >-
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:klc-postgres
            --vpc-connector=klc-connector
            --vpc-egress=private-ranges-only
            --set-env-vars=ASPNETCORE_ENVIRONMENT=Production,EnableApiDocs=true,Ocpp__GatewayUrl=https://ocpp.ev.odcall.com
            --set-secrets=ConnectionStrings__Default=db-connection-string:latest,ConnectionStrings__Redis=redis-connection-string:latest,Jwt__SecretKey=jwt-secret-key:latest,Internal__ApiKey=internal-api-key:latest,Payment__MoMo__PartnerCode=momo-partner-code:latest,Payment__MoMo__AccessKey=momo-access-key:latest,Payment__MoMo__SecretKey=momo-secret-key:latest,Payment__VnPay__TmnCode=vnpay-tmn-code:latest,Payment__VnPay__HashSecret=vnpay-hash-secret:latest,Payment__VnPay__BaseUrl=vnpay-base-url:latest,Payment__VnPay__QueryApiUrl=vnpay-query-api-url:latest,Firebase__WebApiKey=firebase-web-api-key:latest

      - name: Deploy Admin Portal
        if: needs.changes.outputs.admin-portal == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        id: deploy-portal
        with:
          service: klc-admin-portal
          region: ${{ env.GCP_REGION }}
          image: ${{ env.AR_REPO }}/admin-portal:${{ github.sha }}
          flags: >-
            --port=3000
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --set-env-vars=NODE_ENV=production,BACKEND_API_URL=https://api.ev.odcall.com,OIDC_CLIENT_ID=KLC_Api
            --set-secrets=OIDC_CLIENT_SECRET=oidc-client-secret:latest

      # -----------------------------------------------------------------------
      # Smoke tests (run after all deploys to avoid blocking)
      # -----------------------------------------------------------------------
      - name: Smoke test services
        run: |
          FAILED=0
          for PAIR in \
            "Admin API|${{ steps.deploy-api.outputs.url }}/health" \
            "OCPP Gateway|${{ steps.deploy-gateway.outputs.url }}/health" \
            "Driver BFF|${{ steps.deploy-bff.outputs.url }}/health" \
            "Admin Portal|${{ steps.deploy-portal.outputs.url }}"
          do
            NAME="${PAIR%%|*}"
            URL="${PAIR##*|}"
            if [ -z "$URL" ]; then continue; fi
            echo "Checking ${NAME}..."
            OK=0
            for i in $(seq 1 6); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || true)
              if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ]; then echo "  ✓ ${NAME} healthy"; OK=1; break; fi
              echo "  Attempt $i: $STATUS"; sleep 5
            done
            if [ "$OK" = "0" ]; then echo "::error::${NAME} smoke test failed"; FAILED=1; fi
          done
          exit $FAILED

  # ---------------------------------------------------------------------------
  # Database Migration (manual trigger only)
  # ---------------------------------------------------------------------------
  db-migrate:
    name: Run Database Migrations
    runs-on: [self-hosted, linux, x64, gce]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations == 'true'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install EF Core tools
        run: |
          dotnet tool install --global dotnet-ef || true
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Start Cloud SQL Auth Proxy
        run: |
          # Use /tmp — runner does not have write access to /usr/local/bin
          PROXY_BIN="/tmp/cloud-sql-proxy"
          if [ ! -f "$PROXY_BIN" ]; then
            curl -fsSL -o "$PROXY_BIN" \
              "https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64"
            chmod +x "$PROXY_BIN"
          fi
          # Start proxy in background (IAM auth via workload identity)
          "$PROXY_BIN" \
            "klc-ev-charging:asia-southeast1:klc-postgres" \
            --port 5433 --quiet &
          echo "CLOUD_SQL_PROXY_PID=$!" >> $GITHUB_ENV
          # Wait for proxy to be ready (up to 15s)
          for i in $(seq 1 15); do
            if nc -z localhost 5433 2>/dev/null; then echo "Cloud SQL Proxy ready"; break; fi
            sleep 1
          done

      - name: Restore NuGet packages
        run: dotnet restore src/backend

      - name: Run database migrations
        run: |
          dotnet ef database update \
            --project src/backend/src/KLC.EntityFrameworkCore \
            --startup-project src/backend/src/KLC.HttpApi.Host
        env:
          ConnectionStrings__Default: ${{ secrets.DB_MIGRATION_CONNECTION_STRING }}

      - name: Stop Cloud SQL Auth Proxy
        if: always()
        run: |
          if [ -n "$CLOUD_SQL_PROXY_PID" ]; then
            kill "$CLOUD_SQL_PROXY_PID" || true
          fi
