name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/admin-portal/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  AR_REPO: asia-southeast1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/klc-backend

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin-portal: ${{ steps.filter.outputs.admin-portal }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/backend/**'
            admin-portal:
              - 'src/admin-portal/**'

  test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: KLC
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Test
        run: dotnet test src/backend -c Release
        env:
          ConnectionStrings__Default: "Host=localhost;Port=5433;Database=KLC;Username=postgres;Password=postgres"

  deploy-admin-api:
    name: Deploy Admin API
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always() && needs.changes.outputs.backend == 'true' && (needs.test.result == 'success')
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Admin API image
        run: |
          IMAGE="${{ env.AR_REPO }}/admin-api:${{ github.sha }}"
          docker build -t "${IMAGE}" -f src/backend/src/KLC.HttpApi.Host/Dockerfile src/backend
          docker tag "${IMAGE}" "${{ env.AR_REPO }}/admin-api:latest"
          docker push "${IMAGE}"
          docker push "${{ env.AR_REPO }}/admin-api:latest"

      - name: Deploy Admin API to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: klc-admin-api
          region: ${{ env.GCP_REGION }}
          image: ${{ env.AR_REPO }}/admin-api:${{ github.sha }}
          flags: >-
            --port=8080
            --memory=1Gi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --timeout=3600
            --session-affinity
            --add-cloudsql-instances=klc-ev-charging:asia-southeast1:klc-postgres
            --vpc-connector=klc-connector
            --vpc-egress=private-ranges-only
            --set-env-vars=^||^ASPNETCORE_ENVIRONMENT=Production||App__CorsOrigins=https://ev.odcall.com,https://api.ev.odcall.com,http://localhost:3001
            --set-secrets=ConnectionStrings__Default=db-connection-string:latest,ConnectionStrings__Redis=redis-connection-string:latest,Jwt__SecretKey=jwt-secret-key:latest,StringEncryption__DefaultPassPhrase=string-encryption-passphrase:latest,Payment__MoMo__PartnerCode=momo-partner-code:latest,Payment__MoMo__AccessKey=momo-access-key:latest,Payment__MoMo__SecretKey=momo-secret-key:latest,Payment__VnPay__TmnCode=vnpay-tmn-code:latest,Payment__VnPay__HashSecret=vnpay-hash-secret:latest

  deploy-driver-bff:
    name: Deploy Driver BFF
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always() && needs.changes.outputs.backend == 'true' && (needs.test.result == 'success')
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Driver BFF image
        run: |
          IMAGE="${{ env.AR_REPO }}/driver-bff:${{ github.sha }}"
          docker build -t "${IMAGE}" -f src/backend/src/KLC.Driver.BFF/Dockerfile src/backend
          docker tag "${IMAGE}" "${{ env.AR_REPO }}/driver-bff:latest"
          docker push "${IMAGE}"
          docker push "${{ env.AR_REPO }}/driver-bff:latest"

      - name: Deploy Driver BFF to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: klc-driver-bff
          region: ${{ env.GCP_REGION }}
          image: ${{ env.AR_REPO }}/driver-bff:${{ github.sha }}
          flags: >-
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --add-cloudsql-instances=klc-ev-charging:asia-southeast1:klc-postgres
            --vpc-connector=klc-connector
            --vpc-egress=private-ranges-only
            --set-env-vars=ASPNETCORE_ENVIRONMENT=Production
            --set-secrets=ConnectionStrings__Default=db-connection-string:latest,ConnectionStrings__Redis=redis-connection-string:latest,Jwt__SecretKey=jwt-secret-key:latest,Payment__MoMo__PartnerCode=momo-partner-code:latest,Payment__MoMo__AccessKey=momo-access-key:latest,Payment__MoMo__SecretKey=momo-secret-key:latest,Payment__VnPay__TmnCode=vnpay-tmn-code:latest,Payment__VnPay__HashSecret=vnpay-hash-secret:latest

  deploy-admin-portal:
    name: Deploy Admin Portal
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.admin-portal == 'true'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Admin Portal image
        run: |
          IMAGE="${{ env.AR_REPO }}/admin-portal:${{ github.sha }}"
          docker build -t "${IMAGE}" \
            --build-arg NEXT_PUBLIC_API_URL=https://api.ev.odcall.com \
            -f src/admin-portal/Dockerfile src/admin-portal
          docker tag "${IMAGE}" "${{ env.AR_REPO }}/admin-portal:latest"
          docker push "${IMAGE}"
          docker push "${{ env.AR_REPO }}/admin-portal:latest"

      - name: Deploy Admin Portal to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: klc-admin-portal
          region: ${{ env.GCP_REGION }}
          image: ${{ env.AR_REPO }}/admin-portal:${{ github.sha }}
          flags: >-
            --port=3000
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --set-env-vars=NODE_ENV=production,BACKEND_API_URL=https://api.ev.odcall.com,OIDC_CLIENT_ID=KLC_Api
            --set-secrets=OIDC_CLIENT_SECRET=oidc-client-secret:latest
