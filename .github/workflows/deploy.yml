name: Deploy Staging

on:
  push:
    branches: [develop]
    paths:
      - "src/backend/**"
      - "src/admin-portal/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      run_migrations:
        description: "Run EF Core database migrations"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  AR_REPO: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/klc-backend

permissions:
  contents: read
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Detect which paths changed
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: [self-hosted, linux, x64, gce]
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin-portal: ${{ steps.filter.outputs.admin-portal }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/backend/**'
            admin-portal:
              - 'src/admin-portal/**'

  # ---------------------------------------------------------------------------
  # Backend tests (gate for deploy)
  # ---------------------------------------------------------------------------
  test:
    name: Backend Tests
    runs-on: [self-hosted, linux, x64, gce]
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: KLC
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test
        run: dotnet test src/backend -c Release --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results
        env:
          ConnectionStrings__Default: "Host=localhost;Port=5433;Database=KLC;Username=postgres;Password=postgres"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Build & push Docker images
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Images
    runs-on: [self-hosted, linux, x64, gce]
    needs: [changes, test]
    if: |
      always() &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.admin-portal == 'true') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # Admin API (also serves OCPP WebSocket)
      - name: Build Backend API
        if: needs.changes.outputs.backend == 'true'
        run: |
          IMAGE="${{ env.AR_REPO }}/backend-api:${{ github.sha }}"
          docker build -t "${IMAGE}" -f src/backend/src/KLC.HttpApi.Host/Dockerfile src/backend
          docker tag "${IMAGE}" "${{ env.AR_REPO }}/backend-api:latest"
          docker push "${IMAGE}"
          docker push "${{ env.AR_REPO }}/backend-api:latest"

      # Driver BFF
      - name: Build BFF Socket
        if: needs.changes.outputs.backend == 'true'
        run: |
          IMAGE="${{ env.AR_REPO }}/bff-socket:${{ github.sha }}"
          docker build -t "${IMAGE}" -f src/backend/src/KLC.Driver.BFF/Dockerfile src/backend
          docker tag "${IMAGE}" "${{ env.AR_REPO }}/bff-socket:latest"
          docker push "${IMAGE}"
          docker push "${{ env.AR_REPO }}/bff-socket:latest"

      # Admin Portal
      - name: Build Admin Portal
        if: needs.changes.outputs.admin-portal == 'true'
        run: |
          IMAGE="${{ env.AR_REPO }}/admin-portal:${{ github.sha }}"
          docker build -t "${IMAGE}" \
            --build-arg NEXT_PUBLIC_API_URL=https://api.ev.odcall.com \
            -f src/admin-portal/Dockerfile src/admin-portal
          docker tag "${IMAGE}" "${{ env.AR_REPO }}/admin-portal:latest"
          docker push "${IMAGE}"
          docker push "${{ env.AR_REPO }}/admin-portal:latest"

  # ---------------------------------------------------------------------------
  # Deploy to staging (klc-* services)
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: Deploy Backend API
    runs-on: [self-hosted, linux, x64, gce]
    needs: [changes, build]
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 10

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Admin API
        id: deploy-api
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: klc-admin-api
          region: ${{ env.GCP_REGION }}
          image: ${{ env.AR_REPO }}/backend-api:${{ github.sha }}
          flags: >-
            --port=8080
            --memory=1Gi
            --cpu=1
            --min-instances=1
            --max-instances=2
            --concurrency=200
            --timeout=3600
            --session-affinity
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:klc-postgres
            --vpc-connector=klc-connector
            --vpc-egress=private-ranges-only
            --cpu-boost
            --set-env-vars=^||^ASPNETCORE_ENVIRONMENT=Production||App__CorsOrigins=https://ev.odcall.com,https://api.ev.odcall.com,http://localhost:3001
            --set-secrets=ConnectionStrings__Default=db-connection-string:latest,ConnectionStrings__Redis=redis-connection-string:latest,Jwt__SecretKey=jwt-secret-key:latest,StringEncryption__DefaultPassPhrase=string-encryption-passphrase:latest,Payment__MoMo__PartnerCode=momo-partner-code:latest,Payment__MoMo__AccessKey=momo-access-key:latest,Payment__MoMo__SecretKey=momo-secret-key:latest,Payment__VnPay__TmnCode=vnpay-tmn-code:latest,Payment__VnPay__HashSecret=vnpay-hash-secret:latest,Payment__VnPay__BaseUrl=vnpay-base-url:latest,Payment__VnPay__QueryApiUrl=vnpay-query-api-url:latest,OPENIDDICT_SIGNING_CERT=openiddict-signing-cert:latest,OPENIDDICT_SIGNING_PASSWORD=openiddict-signing-password:latest,OPENIDDICT_ENCRYPTION_CERT=openiddict-encryption-cert:latest,OPENIDDICT_ENCRYPTION_PASSWORD=openiddict-encryption-password:latest

      - name: Smoke test
        run: |
          URL="${{ steps.deploy-api.outputs.url }}/health"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || true)
            if [ "$STATUS" = "200" ]; then echo "Admin API healthy"; exit 0; fi
            echo "Attempt $i: $STATUS"; sleep 10
          done
          echo "::error::Admin API smoke test failed"; exit 1

  deploy-bff:
    name: Deploy Driver BFF
    runs-on: [self-hosted, linux, x64, gce]
    needs: [changes, build]
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 10

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Driver BFF
        id: deploy-bff
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: klc-driver-bff
          region: ${{ env.GCP_REGION }}
          image: ${{ env.AR_REPO }}/bff-socket:${{ github.sha }}
          flags: >-
            --port=8080
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --add-cloudsql-instances=${{ secrets.GCP_PROJECT_ID }}:${{ env.GCP_REGION }}:klc-postgres
            --vpc-connector=klc-connector
            --vpc-egress=private-ranges-only
            --set-env-vars=ASPNETCORE_ENVIRONMENT=Production,EnableApiDocs=true
            --set-secrets=ConnectionStrings__Default=db-connection-string:latest,ConnectionStrings__Redis=redis-connection-string:latest,Jwt__SecretKey=jwt-secret-key:latest,Payment__MoMo__PartnerCode=momo-partner-code:latest,Payment__MoMo__AccessKey=momo-access-key:latest,Payment__MoMo__SecretKey=momo-secret-key:latest,Payment__VnPay__TmnCode=vnpay-tmn-code:latest,Payment__VnPay__HashSecret=vnpay-hash-secret:latest,Payment__VnPay__BaseUrl=vnpay-base-url:latest,Payment__VnPay__QueryApiUrl=vnpay-query-api-url:latest

      - name: Smoke test
        run: |
          URL="${{ steps.deploy-bff.outputs.url }}/health"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || true)
            if [ "$STATUS" = "200" ]; then echo "BFF healthy"; exit 0; fi
            echo "Attempt $i: $STATUS"; sleep 10
          done
          echo "::error::BFF smoke test failed"; exit 1

  deploy-portal:
    name: Deploy Admin Portal
    runs-on: [self-hosted, linux, x64, gce]
    needs: [changes, build]
    if: needs.changes.outputs.admin-portal == 'true'
    timeout-minutes: 10

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Admin Portal
        id: deploy-portal
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: klc-admin-portal
          region: ${{ env.GCP_REGION }}
          image: ${{ env.AR_REPO }}/admin-portal:${{ github.sha }}
          flags: >-
            --port=3000
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=3
            --set-env-vars=NODE_ENV=production,BACKEND_API_URL=https://api.ev.odcall.com,OIDC_CLIENT_ID=KLC_Api
            --set-secrets=OIDC_CLIENT_SECRET=oidc-client-secret:latest

      - name: Smoke test
        run: |
          URL="${{ steps.deploy-portal.outputs.url }}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "307" ]; then echo "Portal healthy"; exit 0; fi
            echo "Attempt $i: $STATUS"; sleep 5
          done
          echo "::error::Portal smoke test failed"; exit 1

  # ---------------------------------------------------------------------------
  # Database Migration (manual trigger only)
  # ---------------------------------------------------------------------------
  db-migrate:
    name: Run Database Migrations
    runs-on: [self-hosted, linux, x64, gce]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_migrations == 'true'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Run database migrations
        run: |
          dotnet ef database update \
            --project src/backend/src/KLC.EntityFrameworkCore \
            --startup-project src/backend/src/KLC.HttpApi.Host
        env:
          ConnectionStrings__Default: ${{ secrets.DB_CONNECTION_STRING }}
