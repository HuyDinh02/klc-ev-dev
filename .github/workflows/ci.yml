name: CI

on:
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: [self-hosted, linux, x64, gce]
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin-portal: ${{ steps.filter.outputs.admin-portal }}
      driver-app: ${{ steps.filter.outputs.driver-app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/backend/**'
            admin-portal:
              - 'src/admin-portal/**'
            driver-app:
              - 'src/driver-app/**'

  backend-test:
    name: Backend Tests
    runs-on: [self-hosted, linux, x64, gce]
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: KLC
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test
        run: dotnet test src/backend -c Release --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results
        env:
          ConnectionStrings__Default: "Host=localhost;Port=5433;Database=KLC;Username=postgres;Password=postgres"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: ./test-results
          retention-days: 7

  admin-portal-check:
    name: Admin Portal Check
    runs-on: [self-hosted, linux, x64, gce]
    needs: changes
    if: needs.changes.outputs.admin-portal == 'true'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/admin-portal/package-lock.json

      - name: Install & check
        working-directory: src/admin-portal
        run: |
          npm ci
          npx tsc --noEmit
          npx vitest run

  driver-app-test:
    name: Driver App Tests
    runs-on: [self-hosted, linux, x64, gce]
    needs: changes
    if: needs.changes.outputs.driver-app == 'true'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/driver-app/package-lock.json

      - name: Install & test
        working-directory: src/driver-app
        run: |
          npm ci
          npx jest --ci --coverage
