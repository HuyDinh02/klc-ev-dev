name: CI

on:
  pull_request:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  changes:
    name: Detect changes
    runs-on: [self-hosted, linux, x64, gce]
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      admin-portal: ${{ steps.filter.outputs.admin-portal }}
      driver-app: ${{ steps.filter.outputs.driver-app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            backend:
              - 'src/backend/**'
            admin-portal:
              - 'src/admin-portal/**'
            driver-app:
              - 'src/driver-app/**'

  backend-test:
    name: Backend Tests
    runs-on: [self-hosted, linux, x64, gce]
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: KLC
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test with coverage
        run: |
          dotnet test src/backend -c Release \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./test-results \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
        env:
          ConnectionStrings__Default: "Host=localhost;Port=5433;Database=KLC;Username=postgres;Password=postgres"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: ./test-results
          retention-days: 7

      # Copy coverage reports to expected path
      - name: Collect coverage reports
        if: always()
        run: |
          mkdir -p src/backend/test/coverage
          find . -name "coverage.opencover.xml" -exec cp {} src/backend/test/coverage/ \; 2>/dev/null || true

  admin-portal-check:
    name: Admin Portal Check
    runs-on: [self-hosted, linux, x64, gce]
    needs: changes
    if: needs.changes.outputs.admin-portal == 'true'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/admin-portal/package-lock.json

      - name: Install & check
        working-directory: src/admin-portal
        run: |
          npm ci
          npx tsc --noEmit
          npx vitest run

  sonarcloud:
    name: SonarCloud Scan
    runs-on: [self-hosted, linux, x64, gce]
    needs: [backend-test, admin-portal-check]
    if: always()
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for accurate blame/coverage

      - name: Download backend test results
        uses: actions/download-artifact@v4
        with:
          name: backend-test-results
          path: test-results
        continue-on-error: true

      - name: Setup Java (required by SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  driver-app-test:
    name: Driver App Tests
    runs-on: [self-hosted, linux, x64, gce]
    needs: changes
    if: needs.changes.outputs.driver-app == 'true'
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/driver-app/package-lock.json

      - name: Install & test
        working-directory: src/driver-app
        run: |
          npm ci
          npx jest --ci --coverage
