name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: KLC
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Restore dependencies
        run: dotnet restore src/backend

      - name: Build
        run: dotnet build src/backend --no-restore -c Release

      - name: Test
        run: dotnet test src/backend --no-restore --no-build -c Release --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results
        env:
          ConnectionStrings__Default: "Host=localhost;Port=5433;Database=KLC;Username=postgres;Password=postgres"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results
          retention-days: 7

  admin-portal-build:
    name: Admin Portal Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/admin-portal/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/admin-portal

      - name: Type check
        run: npx tsc --noEmit
        working-directory: src/admin-portal

      - name: Unit tests
        run: npx vitest run
        working-directory: src/admin-portal

      - name: Build
        run: npm run build
        working-directory: src/admin-portal
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com
