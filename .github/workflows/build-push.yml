name: Build & Push to CMC Registry

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/admin-portal/**"
      - ".github/workflows/build-push.yml"
  workflow_dispatch:

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: false

env:
  CMC_REGISTRY: registry-01.cloud.cmctelecom.vn/default-3556-s57vga6utw38/klc-backend

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Detect which paths changed
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend-api: ${{ steps.filter.outputs.backend-api }}
      bff: ${{ steps.filter.outputs.bff }}
      admin-portal: ${{ steps.filter.outputs.admin-portal }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend-api:
              - 'src/backend/src/KLC.HttpApi.Host/**'
              - 'src/backend/src/KLC.HttpApi/**'
              - 'src/backend/src/KLC.Application/**'
              - 'src/backend/src/KLC.Application.Contracts/**'
              - 'src/backend/src/KLC.Domain/**'
              - 'src/backend/src/KLC.Domain.Shared/**'
              - 'src/backend/src/KLC.EntityFrameworkCore/**'
            bff:
              - 'src/backend/src/KLC.Driver.BFF/**'
              - 'src/backend/src/KLC.Application/**'
              - 'src/backend/src/KLC.Application.Contracts/**'
              - 'src/backend/src/KLC.Domain/**'
              - 'src/backend/src/KLC.Domain.Shared/**'
              - 'src/backend/src/KLC.EntityFrameworkCore/**'
            admin-portal:
              - 'src/admin-portal/**'

  # ---------------------------------------------------------------------------
  # Build & push — ArgoCD Image Updater will detect new image digests and trigger deploy
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend-api == 'true' || needs.changes.outputs.bff == 'true' || needs.changes.outputs.admin-portal == 'true'
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      # TEMPORARY: Check out klc-infrastructure to access admin-portal patch files.
      # Remove this step once the multi-env CSP fix is merged into klc-ev-charging
      # (i.e., when next.config.ts reads domains from NEXT_PUBLIC_API_URL / NEXT_PUBLIC_BFF_URL
      # instead of hard-coding prod domains).
      # Removal checklist:
      #   [ ] PR merged in klc-ev-charging: src/admin-portal/next.config.ts reads from env vars
      #   [ ] Remove this checkout step
      #   [ ] Remove the "Apply admin-portal patch" step below
      #   [ ] Delete klc-infrastructure/patches/admin-portal/next.config.ts
      - name: Checkout klc-infrastructure (for temporary patches)
        uses: actions/checkout@v4
        with:
          repository: K-Charge/klc-infrastructure
          token: ${{ secrets.GH_PAT }}
          path: klc-infrastructure

      # TEMPORARY: Overwrite next.config.ts and Dockerfile with patched versions from
      # klc-infrastructure. Both patches work together:
      #   - Dockerfile patch: declares NEXT_PUBLIC_BFF_URL and NEXT_PUBLIC_SIGNALR_URL
      #     as ARG/ENV so Docker does not silently drop them.
      #   - next.config.ts patch: reads those env vars to build a correct CSP header
      #     for each environment instead of hard-coding prod domains.
      # Without both patches the staging image will block API calls to stag.* domains.
      # Remove this step (and the klc-infrastructure checkout above) once both fixes
      # are merged into klc-ev-charging as a single PR.
      - name: Apply admin-portal patches (TEMPORARY — remove after fix PR is merged)
        if: needs.changes.outputs.admin-portal == 'true'
        run: |
          cp klc-infrastructure/patches/admin-portal/Dockerfile \
             src/admin-portal/Dockerfile
          cp klc-infrastructure/patches/admin-portal/next.config.ts \
             src/admin-portal/next.config.ts
          echo "Applied patches: Dockerfile (multi-env build-args) + next.config.ts (dynamic CSP)."

      - name: Login to CMC Container Registry
        run: |
          echo "${{ secrets.CMC_REGISTRY_PASS }}" | docker login registry-01.cloud.cmctelecom.vn \
            -u "${{ secrets.CMC_REGISTRY_USER }}" --password-stdin

      - name: Build summary
        run: |
          echo "### Build & Push Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Changed | Action |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.changes.outputs.backend-api }}" = "true" ]; then
            echo "| Backend API | ✅ | Build + Push |" >> $GITHUB_STEP_SUMMARY
            echo "| OCPP Gateway | ✅ | Same image as Backend API |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Backend API | — | Skipped |" >> $GITHUB_STEP_SUMMARY
            echo "| OCPP Gateway | — | Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.changes.outputs.bff }}" = "true" ]; then
            echo "| Driver BFF | ✅ | Build + Push |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Driver BFF | — | Skipped |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.changes.outputs.admin-portal }}" = "true" ]; then
            echo "| Admin Portal | ✅ | Build + Push |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Admin Portal | — | Skipped |" >> $GITHUB_STEP_SUMMARY
          fi

      # Backend API (use same image for OCPP Gateway since they share codebase)
      - name: Build Backend API image
        if: needs.changes.outputs.backend-api == 'true'
        run: |
          IMAGE="${{ env.CMC_REGISTRY }}/backend-api"
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build -t "${IMAGE}:${SHORT_SHA}" \
                       -t "${IMAGE}:latest" \
                       -f src/backend/src/KLC.HttpApi.Host/Dockerfile src/backend
          docker push "${IMAGE}:${SHORT_SHA}"
          docker push "${IMAGE}:latest"

      # Driver BFF
      - name: Build BFF Socket image
        if: needs.changes.outputs.bff == 'true'
        run: |
          IMAGE="${{ env.CMC_REGISTRY }}/bff-socket"
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build -t "${IMAGE}:${SHORT_SHA}" \
                       -t "${IMAGE}:latest" \
                       -f src/backend/src/KLC.Driver.BFF/Dockerfile src/backend
          docker push "${IMAGE}:${SHORT_SHA}"
          docker push "${IMAGE}:latest"

      # Admin Portal — NEXT_PUBLIC_* vars are baked into the JS bundle at build time and
      # cannot be changed at runtime via K8s ConfigMap. Two separate images are built so
      # each environment gets the correct URLs hard-coded into its bundle.
      - name: Build Admin Portal image (prod)
        if: needs.changes.outputs.admin-portal == 'true'
        run: |
          IMAGE="${{ env.CMC_REGISTRY }}/admin-portal"
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build -t "${IMAGE}:${SHORT_SHA}" \
                       -t "${IMAGE}:latest" \
                       --build-arg NEXT_PUBLIC_API_URL=https://api.ev.klcenergy.com.vn \
                       --build-arg NEXT_PUBLIC_BFF_URL=https://bff.ev.klcenergy.com.vn \
                       --build-arg NEXT_PUBLIC_SIGNALR_URL=https://api.ev.klcenergy.com.vn/hubs/monitoring \
                       --build-arg NEXT_PUBLIC_OCPP_URL=https://ocpp.ev.klcenergy.com.vn \
                       -f src/admin-portal/Dockerfile src/admin-portal
          docker push "${IMAGE}:${SHORT_SHA}"
          docker push "${IMAGE}:latest"

      - name: Build Admin Portal image (stag)
        if: needs.changes.outputs.admin-portal == 'true'
        run: |
          IMAGE="${{ env.CMC_REGISTRY }}/admin-portal-stag"
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build -t "${IMAGE}:${SHORT_SHA}" \
                       -t "${IMAGE}:latest" \
                       --build-arg NEXT_PUBLIC_API_URL=https://stag.api.ev.klcenergy.com.vn \
                       --build-arg NEXT_PUBLIC_BFF_URL=https://stag.bff.ev.klcenergy.com.vn \
                       --build-arg NEXT_PUBLIC_SIGNALR_URL=https://stag.api.ev.klcenergy.com.vn/hubs/monitoring \
                       --build-arg NEXT_PUBLIC_OCPP_URL=https://stag.ocpp.ev.klcenergy.com.vn \
                       -f src/admin-portal/Dockerfile src/admin-portal
          docker push "${IMAGE}:${SHORT_SHA}"
          docker push "${IMAGE}:latest"

      - name: ArgoCD deployment note
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Next step (automatic):** ArgoCD Image Updater will detect digest" >> $GITHUB_STEP_SUMMARY
          echo "> new in 2 minutes and trigger deploy on cluster." >> $GITHUB_STEP_SUMMARY
